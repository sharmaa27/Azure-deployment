name: Enterprise Azure Deployment Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Initialize Production Node Environment
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Application Dependencies
      run: npm install

    - name: Execute Enterprise Automated Testing Gate
      run: npm run test

  deploy-to-azure:
    needs: validate-and-test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Deploy Production Build to Azure App Service
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'prod-api' # Must match your Azure Web App name exactly
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
